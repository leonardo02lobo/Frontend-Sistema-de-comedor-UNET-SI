syntax = "proto3";

package imageprocessor.v1;

option go_package = "github.com/frankly-bautista/sistema-de-comedor/image-processor-go/proto/generated;generated";

message VariantSpec {
  string name = 1;
  uint32 width = 2;
  uint32 height = 3;
  uint32 quality = 4;
  string format = 5;
}

message ProcessImageRequest {
  string image_id = 1;
  string source_path = 2;
  repeated VariantSpec variants = 3;
}

message ProcessedVariant {
  string name = 1;
  string output_path = 2;
  uint32 width = 3;
  uint32 height = 4;
  uint64 size_bytes = 5;
  string format = 6;
}

message ProcessImageResponse {
  string image_id = 1;
  repeated ProcessedVariant variants = 2;
}

service ImageProcessorService {
  rpc ProcessImage(ProcessImageRequest) returns (ProcessImageResponse);
}
